# nginx config for the FICSIT Foreman web client.
#
# Serves the built SPA and reverse-proxies /api to the backend so the browser
# talks to a single origin (no CORS). SSE works because buffering is disabled on
# the proxied path — chat tokens reach the browser as they stream.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets with a long cache; the SPA entry is always revalidated.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API + chat stream → backend (the compose service name "server").
    location /api/ {
        proxy_pass http://server:8724;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        # SSE-friendly: stream straight through, no buffering or early timeout.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # SPA fallback — every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
