  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

!-- ══════════════════════════════ -->\n    <div style=\"width:308px; flex-shrink:0; border-right:1px solid #1a1612; display:flex; flex-direction:column; position:relative; overflow:hidden\">\n\n      <!-- Column label + history toggle -->\n      <div style=\"height:28px; background:#0a0906; border-bottom:1px solid #161410; display:flex; align-items:center; justify-content:space-between; padding:0 10px; flex-shrink:0\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:7.5px; color:#706860; letter-spacing:0.2em\">INTERCOM<\u002Fspan>\n        <button onclick=\"{{ toggleHistory }}\" style=\"{{ historyBtnStyle }}\">{{ historyBtnLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- Messages -->\n      <div ref=\"{{ chatRef }}\" style=\"flex:1; overflow-y:auto; padding:10px 11px; display:flex; flex-direction:column; gap:8px; min-height:0\">\n        <sc-for list=\"{{ msgs }}\" as=\"msg\" hint-placeholder-count=\"4\">\n          <div style=\"animation:fadeInUp 0.18s ease\">\n            <sc-if value=\"{{ msg.isForeman }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex; align-items:flex-start; gap:7px; border-left:2px solid #c87830; padding-left:8px\">\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:7px; color:#c87830; letter-spacing:0.12em; padding-top:3px; flex-shrink:0; line-height:1\">FM<\u002Fspan>\n                <div style=\"font-family:'Barlow',sans-serif; font-size:12.5px; color:#cac2aa; line-height:1.65\">{{ msg.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ msg.isPlayer }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; align-items:flex-start; gap:7px; padding-left:10px\">\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:7px; color:#706860; letter-spacing:0.12em; padding-top:3px; flex-shrink:0; line-height:1\">YOU<\u002Fspan>\n                <div style=\"font-family:'Barlow',sans-serif; font-size:12.5px; color:#b0a898; line-height:1.65\">{{ msg.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ showStream }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; align-items:flex-start; gap:7px; border-left:2px solid #c87830; padding-left:8px; animation:fadeInUp 0.12s ease\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:7px; color:#c87830; letter-spacing:0.12em; padding-top:3px; flex-shrink:0; line-height:1\">FM<\u002Fspan>\n            <div style=\"font-family:'Barlow',sans-serif; font-size:12.5px; color:#cac2aa; line-height:1.65\">{{ streamDisplay }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- Input -->\n      <div style=\"border-top:1px solid #1a1612; padding:7px 10px; background:#080706; flex-shrink:0; display:flex; gap:6px; align-items:center\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:14px; color:#30281e; line-height:1\">›<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; color:#1e1c18; font-style:italic; flex:1\">message the foreman_<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:7px; color:#302c26; border:1px solid #201c14; padding:2px 5px; letter-spacing:0.06em\">↵<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- History drawer (slides down over the chat area) -->\n      <div style=\"{{ historyDrawerStyle }}\">\n        <div style=\"height:28px; background:#0a0906; border-bottom:1px solid #161410; display:flex; align-items:center; justify-content:space-between; padding:0 10px; flex-shrink:0\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:7.5px; color:#706860; letter-spacing:0.2em\">WORK HISTORY<\u002Fspan>\n          <button onclick=\"{{ toggleHistory }}\" style=\"background:none; border:none; cursor:pointer; font-family:'IBM Plex Mono',monospace; font-size:7px; color:#38342c; letter-spacing:0.1em; padding:0; line-height:1\">✕ CLOSE<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"flex:1; overflow-y:auto\">\n          <sc-for list=\"{{ historyItems }}\" as=\"item\" hint-placeholder-count=\"6\">\n            <div onclick=\"{{ item.selectHandler }}\" style=\"{{ item.wrapStyle }}\">\n              <div style=\"{{ item.idStyle }}\">{{ item.id }}<\u002Fdiv>\n              <div style=\"{{ item.titleStyle }}\">{{ item.title }}<\u002Fdiv>\n              <div style=\"{{ item.statusStyle }}\">{{ item.status }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- ══════════════════════════════ -->\n    <!-- WORK ORDER PANEL (primary)     -->\n    <!-- ══════════════════════════════ -->\n    <div style=\"flex:1; display:flex; flex-direction:column; background:#0f0e0b; min-width:0; overflow:hidden\">\n\n      <!-- WO Header -->\n      <div style=\"border-top:3px solid #c87830; padding:12px 20px 10px; border-bottom:1px solid #1e1a12; flex-shrink:0\">\n        <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:8px\">\n          <div style=\"min-width:0\">\n            <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:3px\">\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:8.5px; color:#c87830; letter-spacing:0.1em\">WO-0047<\u002Fspan>\n              <div style=\"width:18px; height:1px; background:#2a2218; flex-shrink:0\"><\u002Fdiv>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:7.5px; color:#4a4438; letter-spacing:0.08em\">TIER 6 · TURBOFUEL PHASE<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'Barlow Condensed',sans-serif; font-size:23px; font-weight:800; color:#d0c8b0; letter-spacing:0.04em; line-height:1\">TURBOFUEL PRODUCTION LOOP<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; padding-top:2px\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:7.5px; color:#c87830; background:#1c1008; border:1px solid #3a2010; padding:3px 8px; letter-spacing:0.1em\">IN PROGRESS<\u002Fdiv>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:7.5px; color:#605a50; letter-spacing:0.08em\">2 / 7 STEPS<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Objective -->\n        <div style=\"border-top:1px solid #181410; padding-top:8px\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:7px; color:#706858; letter-spacing:0.15em\">OBJ · <\u002Fspan><span style=\"font-family:'Barlow',sans-serif; font-size:11.5px; color:#b4aca0; line-height:1.5; text-wrap:pretty\">Establish a turbofuel production loop feeding 8 fuel generators. Crude oil from Node 12 is live. Complete the refinery chain, install blenders, and pipe turbofuel to the generator manifold.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- WO Body grid: build steps | right panel -->\n      <div style=\"flex:1; display:grid; grid-template-columns:1fr 288px; min-height:0; overflow:hidden\">\n\n        <!-- BUILD STEPS -->\n        <div style=\"border-right:1px solid #1e1a12; overflow-y:auto; padding:14px 18px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:7.5px; color:#908880; letter-spacing:0.22em; margin-bottom:10px\">BUILD STEPS<\u002Fdiv>\n          <sc-for list=\"{{ buildSteps }}\" as=\"step\" hint-placeholder-count=\"7\">\n            <div style=\"{{ step.wrapStyle }}\">\n              <div style=\"display:flex; align-items:flex-start; gap:8px\">\n                <div style=\"{{ step.numStyle }}\">{{ step.numDisplay }}<\u002Fdiv>\n                <div style=\"flex:1; min-width:0; padding-bottom:18px\">\n                  <div style=\"{{ step.titleStyle }}\">{{ step.title }}<\u002Fdiv>\n                  <sc-if value=\"{{ step.hasProgress }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"display:flex; align-items:center; gap:8px; margin-top:5px\">\n                      <div style=\"flex:1; height:2px; background:#1a1814; border-radius:1px; overflow:hidden\">\n                        <div style=\"{{ step.progressFillStyle }}\"><\u002Fdiv>\n                      <\u002Fdiv>\n                      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; color:#9a9080; letter-spacing:0.06em; flex-shrink:0\">{{ step.progressText }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ step.hasNote }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"{{ step.noteStyle }}\">{{ step.noteText }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- RIGHT PANEL: materials + cost + output -->\n        <div style=\"display:flex; flex-direction:column; overflow:hidden\">\n\n          <!-- Materials checklist -->\n          <div style=\"flex:1; overflow-y:auto; padding:14px 14px 8px; border-bottom:1px solid #1a1612; min-height:0\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:7.5px; color:#908880; letter-spacing:0.22em; margin-bottom:8px\">MATERIALS<\u002Fdiv>\n            <sc-for list=\"{{ materials }}\" as=\"mat\" hint-placeholder-count=\"7\">\n              <div style=\"{{ mat.rowStyle }}\">\n                <span style=\"{{ mat.symbolStyle }}\">{{ mat.symbol }}<\u002Fspan>\n                <span style=\"{{ mat.nameStyle }}\">{{ mat.name }}<\u002Fspan>\n                <span style=\"{{ mat.qtyStyle }}\">{{ mat.qty }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- Remaining build cost -->\n          <div style=\"padding:11px 14px 10px; border-bottom:1px solid #1a1612; flex-shrink:0\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:7.5px; color:#908880; letter-spacing:0.22em; margin-bottom:6px\">REMAINING COST<\u002Fdiv>\n            <sc-for list=\"{{ buildCost }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex; justify-content:space-between; align-items:baseline; padding:2px 0\">\n                <span style=\"font-family:'Barlow',sans-serif; font-size:12px; color:#a8a090\">{{ c.item }}<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:#9a9080\">×{{ c.qty }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- Expected output -->\n          <div style=\"padding:11px 14px 12px; flex-shrink:0\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:7.5px; color:#908880; letter-spacing:0.22em; margin-bottom:6px\">EXPECTED OUTPUT<\u002Fdiv>\n            <sc-for list=\"{{ expectedOutput }}\" as=\"o\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; justify-content:space-between; align-items:baseline; padding:2px 0\">\n                <span style=\"font-family:'Barlow',sans-serif; font-size:12px; color:#a8a090\">{{ o.label }}<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; color:#c87830\">{{ o.value }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Foreman Notes (bottom bar) -->\n      <div style=\"border-top:1px solid #1e1a12; padding:9px 20px 10px; background:#0c0a08; flex-shrink:0\">\n        <div style=\"border-left:2px solid #c87830; padding-left:12px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:7px; color:#c87830; letter-spacing:0.18em; margin-bottom:4px\">FM NOTES<\u002Fdiv>\n          <div style=\"font-family:'Barlow',sans-serif; font-size:11.5px; color:#bcb4a4; line-height:1.5; text-wrap:pretty\">Leave 8m clearance east of the blenders for the conveyor run from the copper node. Lay floor foundations before dropping blenders — awkward to retrofit. Mk.3 belts minimum on coal and compacted coal or you'll starve the line at load.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  historyData = [\n    { id: 'WO-0046', title: 'IRON SMELTER EXPANSION',  status: 'COMPLETE' },\n    { id: 'WO-0045', title: 'COAL POWER GRID',          status: 'COMPLETE' },\n    { id: 'WO-0044', title: 'REINFORCED PLATE LINE',    status: 'COMPLETE' },\n    { id: 'WO-0043', title: 'BIOMASS BURNER PHASE',     status: 'COMPLETE' },\n    { id: 'WO-0042', title: 'COPPER INGOT OVERFLOW',    status: 'SKIPPED'  },\n    { id: 'WO-0041', title: 'INITIAL POWER SETUP',      status: 'COMPLETE' },\n  ];\n\n  buildStepData = [\n    { n:1, title:'Route crude oil pipeline from Node 12',       status:'complete', note:'Pipeline laid and pressurised.' },\n    { n:2, title:'Commission sulphur miners (Mk.1)',            status:'complete', note:null },\n    { n:3, title:'Place 6× Fuel Refineries',                    status:'active',   prog:{ val:2, max:6 }, note:'4 remaining · lay concrete pads first, then snap to existing power poles at 3-unit spacing.' },\n    { n:4, title:'Configure refinery recipes to Turbofuel',     status:'pending',  prog:{ val:0, max:6 }, note:null },\n    { n:5, title:'Install 4× Turbofuel Blenders',               status:'pending',  prog:{ val:0, max:4 }, note:null },\n    { n:6, title:'Connect blenders to heavy oil residue loop',  status:'pending',  note:null },\n    { n:7, title:'Route turbofuel output to generator manifold',status:'pending',  note:null },\n  ];\n\n  materialsData = [\n    { name:'Iron Plate',          qty:'80 / 80',   status:'ok'      },\n    { name:'Copper Sheet',        qty:'60 / 60',   status:'ok'      },\n    { name:'Heavy Modular Frame', qty:'4 / 4',     status:'ok'      },\n    { name:'Concrete',            qty:'0 / 160',   status:'short'   },\n    { name:'Rubber',              qty:'0 / 80',    status:'short'   },\n    { name:'AI Limiter',          qty:'3 / 8',     status:'partial' },\n    { name:'Circuit Board',       qty:'0 / 4',     status:'short'   },\n  ];\n\n  buildCostData = [\n    { item:'Concrete',     qty:160 },\n    { item:'Rubber',       qty:80  },\n    { item:'AI Limiter',   qty:5   },\n    { item:'Circuit Board',qty:4   },\n  ];\n\n  outputData = [\n    { label:'Turbofuel',         value:'150 /min'   },\n    { label:'Generator output',  value:'2,250 MW'   },\n    { label:'Net power gain',    value:'+1,800 MW'  },\n  ];\n\n  initMsgs = [\n    { id:0, role:'foreman', text:\"Node 12 is live. Get those refineries up — you're burning daylight running on coal.\" },\n    { id:1, role:'player',  text:'How many blenders do I actually need?' },\n    { id:2, role:'foreman', text:\"Four blenders. You have the rubber, barely — don't spend any on other builds. Concrete is the problem. You're 160 short and there's no shortcut. Head to the limestone node south of the hub before you do anything else. It's a five-minute round trip that unblocks the whole order.\" },\n    { id:3, role:'player',  text:'Can I run this on Mk.2 belts for now?' },\n  ];\n\n  streamTarget = \"Negative. Coal and compacted coal each feed the blenders at 45/min — Mk.2 tops at 120/min so technically it works, but you're right at the limit with no headroom. One belt jam, one power blip, and the blenders starve and the whole loop collapses. This thing runs continuously. Use Mk.3. You'll need them anyway when you scale the generator count.\";  \n\n  state = {\n    msgs:        this.initMsgs,\n    streamText:  '',\n    isStreaming: false,\n    historyOpen: false,\n    selectedId:  'WO-0046',\n  };\n\n  charIdx   = 0;\n  streamTimer = null;\n  _t1 = null; _t2 = null; _t3 = null;\n  chatRef = React.createRef();\n\n  componentDidMount() {\n    this._t1 = setTimeout(() => this.startStream(), 1200);\n  }\n\n  componentDidUpdate() {\n    if (this.chatRef.current) {\n      this.chatRef.current.scrollTop = this.chatRef.current.scrollHeight;\n    }\n  }\n\n  componentWillUnmount() {\n    clearInterval(this.streamTimer);\n    [this._t1, this._t2, this._t3].forEach(t => clearTimeout(t));\n  }\n\n  startStream() {\n    this.charIdx = 0;\n    this.setState({ isStreaming:true, streamText:'' });\n    this.streamTimer = setInterval(() => {\n      this.charIdx++;\n      this.setState({ streamText: this.streamTarget.slice(0, this.charIdx) });\n      if (this.charIdx >= this.streamTarget.length) {\n        clearInterval(this.streamTimer);\n        this._t2 = setTimeout(() => {\n          this.setState(s => ({\n            msgs:        [...s.msgs, { id:Date.now(), role:'foreman', text:this.streamTarget }],\n            streamText:  '',\n            isStreaming: false,\n          }));\n          this._t3 = setTimeout(() => {\n            this.setState({ msgs: this.initMsgs });\n            this._t1 = setTimeout(() => this.startStream(), 800);\n          }, 4200);\n        }, 380);\n      }\n    }, 20);\n  }\n\n  renderVals() {\n    const { msgs, streamText, isStreaming, historyOpen, selectedId } = this.state;\n\n    const enrichedMsgs = msgs.map(m => ({\n      ...m,\n      isForeman: m.role === 'foreman',\n      isPlayer:  m.role === 'player',\n    }));\n\n    // ── History items ──\n    const historyItems = this.historyData.map(h => {\n      const sel  = h.id === selectedId;\n      const skip = h.status === 'SKIPPED';\n      return {\n        id: h.id, title: h.title, status: h.status,\n        selectHandler: () => this.setState({ selectedId: h.id }),\n        wrapStyle: {\n          padding:     '7px 10px 6px',\n          cursor:      'pointer',\n          borderLeft:  sel ? '2px solid #c87830' : '2px solid transparent',\n          background:  sel ? '#161410' : 'transparent',\n          borderBottom:'1px solid #161410',\n        },\n        idStyle: {\n          fontFamily:    \"'IBM Plex Mono', monospace\",\n          fontSize:      '7px', letterSpacing:'0.1em',\n          color:         sel ? '#807870' : '#60584e',\n          marginBottom:  '2px',\n        },\n        titleStyle: {\n          fontFamily:     \"'Barlow Condensed', sans-serif\",\n          fontSize:       '12px', fontWeight:600,\n          color:          skip ? '#706860' : (sel ? '#c4bca4' : '#a8a090'),\n          lineHeight:     1.2, letterSpacing:'0.02em',\n          textDecoration: skip ? 'line-through' : 'none',\n          marginBottom:   '2px',\n        },\n        statusStyle: {\n          fontFamily:    \"'IBM Plex Mono', monospace\",\n          fontSize:      '7px', letterSpacing:'0.12em',\n          color:         skip ? '#60584e' : (sel ? '#6aaa48' : '#4a7030'),\n        },\n      };\n    });\n\n    // ── Build steps ──\n    const buildSteps = this.buildStepData.map(s => {\n      const done   = s.status === 'complete';\n      const active = s.status === 'active';\n      const pct    = s.prog ? (s.prog.val / s.prog.max * 100) : 0;\n      return {\n        title: s.title,\n        numDisplay: done ? '✓' : String(s.n),\n        wrapStyle: {\n          borderLeft:  active ? '3px solid #c87830' : (done ? '2px solid #2e4022' : '2px solid #1c1814'),\n          paddingLeft: active ? '9px' : '10px',\n          marginBottom:'1px',\n          background:  active ? 'rgba(200,120,48,0.1)' : 'transparent',\n          borderRadius: active ? '0 2px 2px 0' : '0',\n        },\n        numStyle: {\n          fontFamily:  \"'IBM Plex Mono', monospace\",\n          fontSize:    done ? '11px' : '9px',\n          color:       done ? '#5a8040' : (active ? '#c87830' : '#686058'),\n          letterSpacing:'0.06em',\n          flexShrink:  0,\n          width:       '16px',\n          paddingTop:  '2px',\n          lineHeight:  1,\n        },\n        titleStyle: {\n          fontFamily:     \"'Barlow Condensed', sans-serif\",\n          fontSize:       active ? '15px' : '14px',\n          fontWeight:     done ? 400 : 700,\n          color:          done ? '#706860' : (active ? '#ede5cd' : '#a8a09a'),\n          letterSpacing:  '0.02em',\n          lineHeight:     1.2,\n          textDecoration: done ? 'line-through' : 'none',\n        },\n        hasProgress:      !!s.prog,\n        progressFillStyle:{\n          height:'2px',\n          width: pct + '%',\n          background: active ? '#c87830' : '#2a4020',\n          borderRadius:'1px',\n        },\n        progressText: s.prog ? (s.prog.val + ' / ' + s.prog.max) : '',\n        hasNote:  !!s.note,\n        noteText: s.note || '',\n        noteStyle: {\n          fontFamily: \"'Barlow', sans-serif\",\n          fontSize:   active ? '11.5px' : '10.5px',\n          color:      active ? 'rgba(215,148,68,0.92)' : '#908880',\n          lineHeight: 1.48,\n          marginTop:  active ? '8px' : '3px',\n          fontStyle:  'italic',\n          padding:    active ? '6px 9px' : '0',\n          background: active ? 'rgba(200,120,48,0.08)' : 'transparent',\n          borderLeft: active ? '1px solid rgba(200,120,48,0.35)' : 'none',\n        },\n      };\n    });\n\n    // ── Materials ──\n    const materials = this.materialsData.map(m => {\n      const ok      = m.status === 'ok';\n      const partial = m.status === 'partial';\n      return {\n        symbol: ok ? '✓' : (partial ? '△' : '✗'),\n        name:   m.name,\n        qty:    m.qty,\n        rowStyle: {\n          display:'flex', alignItems:'baseline', gap:'6px',\n          padding:'5.5px 0', borderBottom:'1px solid #141210',\n        },\n        symbolStyle: {\n          fontFamily:'\\'IBM Plex Mono\\', monospace',\n          fontSize:'11px', flexShrink:0, width:'14px', lineHeight:1,\n          color: ok ? '#6aaa48' : (partial ? '#c08038' : '#c04030'),\n        },\n        nameStyle: {\n          fontFamily:'\\'Barlow\\', sans-serif',\n          fontSize:'13px', flex:1,\n          color: ok ? '#a8a090' : '#b0a898',\n        },\n        qtyStyle: {\n          fontFamily:'\\'IBM Plex Mono\\', monospace',\n          fontSize:'11px', letterSpacing:'0.04em', flexShrink:0,\n          color: ok ? '#80b060' : (partial ? '#c89040' : '#d05848'),\n        },\n      };\n    });\n\n    // ── UI state ──\n    const historyBtnStyle = {\n      background:    'none', border:'none', cursor:'pointer',\n      fontFamily:    \"'IBM Plex Mono', monospace\",\n      fontSize:      '7px', letterSpacing:'0.14em',\n      color:         historyOpen ? '#c87830' : '#706860',\n      padding:       '0', lineHeight:1,\n    };\n\n    const historyDrawerStyle = {\n      position:     'absolute',\n      top:          '28px', left:0, right:0, bottom:0,\n      background:   '#0d0c09',\n      display:      'flex', flexDirection:'column',\n      transform:    historyOpen ? 'translateY(0)' : 'translateY(-105%)',\n      transition:   'transform 0.2s ease',\n      zIndex:       10,\n      overflow:     'hidden',\n      pointerEvents:historyOpen ? 'auto' : 'none',\n    };\n\n    return {\n      msgs:            enrichedMsgs,\n      streamDisplay:   streamText + (isStreaming ? '▌' : ''),\n      showStream:      isStreaming || streamText.length > 0,\n      chatRef:         this.chatRef,\n      toggleHistory:   () => this.setState(s => ({ historyOpen: !s.historyOpen })),\n      historyBtnStyle,\n      historyBtnLabel: historyOpen ? 'INTERCOM' : 'HISTORY',\n      historyDrawerStyle,\n      historyItems,\n      buildSteps,\n      materials,\n      buildCost:       this.buildCostData,\n      expectedOutput:  this.outputData,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
