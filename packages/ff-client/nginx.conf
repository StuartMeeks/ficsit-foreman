# nginx config for the FICSIT Foreman web client.
#
# Serves the built SPA and reverse-proxies /api to the backend so the browser
# talks to a single origin (no CORS). SSE works because buffering is disabled on
# the proxied path — chat tokens reach the browser as they stream.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets with a long cache; the SPA entry is always revalidated.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API + chat stream → backend (the compose service name "ff-server").
    location /api/ {
        proxy_pass http://ff-server:8724;
        proxy_http_version 1.1;
        # Use $http_host (not $host): $host drops the port, so the backend would
        # see "localhost" while the browser's Origin is "localhost:8725" — which
        # fails Better Auth's CSRF origin check (403 Invalid origin). $http_host
        # preserves the port so the origin matches.
        proxy_set_header Host $http_host;
        # Forward the client address + scheme/host so the backend can identify the
        # caller (rate limiting) and reconstruct the public origin behind the proxy.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Connection "";

        # SSE-friendly: stream straight through, no buffering or early timeout.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # SPA fallback — every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
