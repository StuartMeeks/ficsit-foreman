version: 2
updates:
  # npm dependencies (workspaces root lockfile covers all packages).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    versioning-strategy: "auto"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

  # GitHub Actions used by the workflows in this repository.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    # One grouped PR for all action updates instead of one per action.
    groups:
      github-actions:
        patterns:
          - "*"

  # Base images used by the per-package Dockerfiles. The Dockerfiles live under
  # packages/*/Dockerfile (there is none at the repo root), and the docker
  # updater does not recurse — so the directories must point at each package, or
  # base-image updates are never detected.
  - package-ecosystem: "docker"
    directories:
      - "/packages/server"
      - "/packages/client"
      - "/packages/sf-mcp"
    schedule:
      interval: "monthly"
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    # Stay on the same Node LTS as engines/CI; don't chase Node image majors.
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
