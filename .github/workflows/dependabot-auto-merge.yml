name: Dependabot auto-merge

# Auto-merge Dependabot pull requests for low-risk updates. Patch and minor
# updates are merged automatically once CI passes; major updates are left for a
# human to review.
#
# The merge is performed by Dependabot itself (via the `@dependabot squash and
# merge` command), because the Dependabot app is the actor exempted in the
# `main protection` ruleset bypass list — so its merge clears the required
# code-owner review while human pull requests stay gated.
#
# Uses `pull_request_target` so the workflow definition is always taken from the
# default branch and runs for every Dependabot PR. This is safe here: the job
# only reads PR metadata and posts a comment — it never checks out or executes
# pull-request code.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    timeout-minutes: 5
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch and minor updates
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr comment "$PR_URL" --body "@dependabot squash and merge"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flag major updates for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr comment "$PR_URL" --body "🔍 Major version update — left for manual review (auto-merge covers patch/minor only)."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
