name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, Mondays 04:32 UTC.
    - cron: "32 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # Exclude vendored/compiled reference artefacts. The north-star design
          # prototype is a bundled, minified HTML mock — never built or served —
          # so scanning its bundle (which trips js/xss-through-dom) is noise.
          config: |
            paths-ignore:
              - packages/client/design-reference

      - name: Analyse
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
