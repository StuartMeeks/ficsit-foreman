name: Validate game data

# Guards bundled game-data pull requests: a data PR must touch only one
# packages/game-data-core/data/<channel>/ directory, ship a well-formed meta.json, and bump
# that channel's build above the current one.
#
# This can be a *required* status check: the `detect` job always runs and, when a
# PR touches no bundled game data, the `validate-game-data` job is skipped.
# GitHub treats a skipped required check as passing, so ordinary PRs are never
# blocked while data PRs are still gated.

on:
  pull_request:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect bundled game-data changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Only added/modified data files count as a data update. Use
          # --name-status with rename detection (-M) and keep just A/M entries so
          # that moving the data directory (e.g. a package rename) does not look
          # like a channel edit — renames (R) and deletions (D) are ignored.
          files=$(git diff --name-status -M "$BASE_SHA" "$HEAD_SHA" \
            | { grep -E '^[AM]\t' || true; } \
            | cut -f2 \
            | { grep '^packages/game-data-core/data/' || true; } \
            | { grep -v '^packages/game-data-core/data/README.md$' || true; })
          if [ -n "$files" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  validate-game-data:
    needs: detect
    if: ${{ needs.detect.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate bundled game data
        run: node .github/scripts/check-game-data.mjs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
