name: Docker image (mcp-save-game)

# Builds the save-game MCP server image and publishes it to GHCR on pushes to main
# and on version tags. Mirrors docker-publish.yml: a `changes` job gates the build
# so :latest is not rebuilt on every main push — it always runs for tags, manual
# runs and PRs, but for a main-branch push only when image-relevant files changed.
#
# The game-data-core path is included because the save-game image depends on the
# @foreman/game-data-core workspace package (for display-name resolution) from the
# world-locations work onward; a core change must rebuild this image too.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'packages/mcp-save-game/**'
      - 'packages/game-data-core/**'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - '.github/workflows/docker-publish-save-game.yml'
      # Doc-only changes don't affect the image.
      - '!**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Decide whether to build
        id: decide
        env:
          EVENT: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          # Always build for tags (releases), manual runs, and PRs (the PR trigger
          # is already path-filtered, so any PR run is image-relevant).
          if [ "$EVENT" != "push" ] || [ "$REF_TYPE" = "tag" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # New branch / unknown previous commit → build to be safe.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
            || ! git rev-parse --verify --quiet "$BEFORE^{commit}" >/dev/null; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # main push: build only if image-relevant files changed.
          changed=$(git diff --name-only "$BEFORE" "$AFTER" \
            | { grep -E '^(packages/mcp-save-game/|packages/game-data-core/|\.dockerignore|package\.json|package-lock\.json|tsconfig\.base\.json|\.github/workflows/docker-publish-save-game\.yml)' || true; } \
            | { grep -vE '\.md$' || true; })
          if [ -n "$changed" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

  docker:
    needs: changes
    if: ${{ needs.changes.outputs.build == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/stuartmeeks/foreman-mcp-save-game
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/mcp-save-game/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
