# Run Foreman with Docker Compose.
#
# Everything is grouped in Docker Desktop under the "foreman" PROJECT (the `name:`
# below), so you start/stop it as one unit even as more services are added.
#
#   docker compose up -d                          # start (pulls images first time)
#   docker compose pull && docker compose up -d   # update to newer images
#   docker compose stop                           # turn OFF but KEEP the containers
#   docker compose start                          # turn them back on
#   docker compose down                           # REMOVE containers + network
#
# For everyday on/off use `stop` / `start` — the containers stay listed in Docker
# Desktop (just stopped). Use `down` only when you want to remove them; your data
# survives either way, in the `foreman-db` volume (see the volumes section).
#
# The project groups separate services (mcp-game-data, server, web) under the one
# "foreman" project so you start and stop them as a unit.
name: foreman

services:
  mcp-game-data:
    # Pull the published image, or build locally if it is not present:
    #   docker compose up -d --build
    image: ghcr.io/stuartmeeks/foreman-mcp-game-data:latest
    build:
      context: .
      dockerfile: packages/mcp-game-data/Dockerfile
    container_name: foreman-mcp-game-data
    ports:
      - "8723:8723"
    restart: unless-stopped

    # ── Optional overrides — uncomment as needed ───────────────────────────────
    # environment:
    #   # Use the experimental channel instead of stable:
    #   SATISFACTORY_GAME_CHANNEL: experimental
    #   # Or point at your own install (also uncomment the volume below):
    #   SATISFACTORY_GAME_DIR: /game
    # volumes:
    #   # Windows (Steam) — adjust to your install path:
    #   - "C:/Program Files (x86)/Steam/steamapps/common/Satisfactory:/game:ro"

  server:
    # Pull the published image, or build locally if it is not present:
    #   docker compose up -d --build
    image: ghcr.io/stuartmeeks/foreman-server:latest
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: foreman-server
    depends_on:
      - mcp-game-data
    ports:
      - "8724:8724"
    environment:
      MCP_URL: http://mcp-game-data:8723/mcp
      DATABASE_URL: file:/data/foreman.db
      # Hosted tier: the server's own Anthropic key. Leave unset to require each
      # client to supply its own key via the x-anthropic-api-key header.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional model override (default claude-sonnet-4-6):
      # ANTHROPIC_MODEL: claude-opus-4-8
      # ── Use a different frontier provider (OpenAI-compatible) ─────────────────
      # Set LLM_PROVIDER=openai with a key + (optionally) a base URL to run on
      # OpenAI, OpenRouter, Gemini's OpenAI-compatible endpoint, etc.
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
    volumes:
      # The SQLite database lives in a named volume, so your sessions and work
      # orders SURVIVE upgrades: `docker compose pull` + `up -d` recreates the
      # container against the new image and re-attaches this volume. Migrations
      # run automatically at start and are additive (never drop data). Plain
      # `docker compose down` keeps it too — only `down -v` (or removing the
      # volume) deletes your data.
      - foreman-db:/data
      # Prefer a folder you control instead? Comment the line above and use a
      # host bind mount — data then lives next to compose.yaml in ./data:
      #   - ./data:/data
    restart: unless-stopped

  web:
    # Pull the published image, or build locally if it is not present:
    #   docker compose up -d --build
    image: ghcr.io/stuartmeeks/foreman-web:latest
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: foreman-web
    depends_on:
      - server
    ports:
      # Open http://localhost:8725 to use the foreman.
      - "8725:80"
    restart: unless-stopped

  # Optional: live save-game data (pioneer progress from a .sav file).
  # DISABLED BY DEFAULT — it only starts under the `save-game` profile, so a plain
  # `docker compose up` ignores it. Point SAVE_FILE_PATH at your save and bring it
  # up with the profile:
  #   SAVE_FILE_PATH=/path/to/MySave.sav docker compose --profile save-game up -d
  # NOTE: this package is currently a scaffold (see packages/mcp-save-game/SPEC.md);
  # the container is wired up but not yet a running server.
  mcp-save-game:
    profiles: ["save-game"]
    image: ghcr.io/stuartmeeks/foreman-mcp-save-game:latest
    build:
      context: .
      dockerfile: packages/mcp-save-game/Dockerfile
    container_name: foreman-mcp-save-game
    ports:
      - "8726:8726"
    environment:
      # Path to the .sav INSIDE the container (mount the save directory below).
      SAVE_FILE_PATH: ${SAVE_FILE_PATH:-}
    # volumes:
    #   # Mount the folder holding your .sav read-only, then set SAVE_FILE_PATH to
    #   # the in-container path, e.g. SAVE_FILE_PATH=/saves/MySave.sav:
    #   - "C:/Users/you/AppData/Local/FactoryGame/Saved/SaveGames:/saves:ro"

volumes:
  # Back up before a major upgrade if you like:
  #   docker run --rm -v foreman-db:/data -v "$PWD:/backup" busybox \
  #     tar czf /backup/foreman-db.tgz /data
  foreman-db:
