# Run Foreman with Docker Compose.
#
# Everything is grouped in Docker Desktop under the "foreman" PROJECT (the `name:`
# below), so you start/stop it as one unit even as more services are added.
#
#   docker compose up -d                          # start (pulls images first time)
#   docker compose pull && docker compose up -d   # update
#   docker compose stop / start                   # stop / start the whole project
#   docker compose down                           # stop and remove
#
# The project groups separate services (mcp, server) under the one "foreman"
# project so you start/stop them as a unit. The Phase 3 web UI joins the same
# project later — see the commented placeholder at the bottom.
name: foreman

services:
  mcp:
    image: ghcr.io/stuartmeeks/foreman-mcp:latest
    container_name: foreman-mcp
    ports:
      - "8723:8723"
    restart: unless-stopped

    # ── Optional overrides — uncomment as needed ───────────────────────────────
    # environment:
    #   # Use the experimental channel instead of stable:
    #   SATISFACTORY_GAME_CHANNEL: experimental
    #   # Or point at your own install (also uncomment the volume below):
    #   SATISFACTORY_GAME_DIR: /game
    # volumes:
    #   # Windows (Steam) — adjust to your install path:
    #   - "C:/Program Files (x86)/Steam/steamapps/common/Satisfactory:/game:ro"

  server:
    # Pull the published image, or build locally if it is not present:
    #   docker compose up -d --build
    image: ghcr.io/stuartmeeks/foreman-server:latest
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: foreman-server
    depends_on:
      - mcp
    ports:
      - "8724:8724"
    environment:
      MCP_URL: http://mcp:8723/mcp
      DATABASE_URL: file:/data/foreman.db
      # Hosted tier: the server's own Anthropic key. Leave unset to require each
      # client to supply its own key via the x-anthropic-api-key header.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional model override (default claude-sonnet-4-6):
      # ANTHROPIC_MODEL: claude-opus-4-8
    volumes:
      # The SQLite database lives in a named volume, so your sessions and work
      # orders SURVIVE upgrades: `docker compose pull` + `up -d` recreates the
      # container against the new image and re-attaches this volume. Migrations
      # run automatically at start and are additive (never drop data). Plain
      # `docker compose down` keeps it too — only `down -v` (or removing the
      # volume) deletes your data.
      - foreman-db:/data
      # Prefer a folder you control instead? Comment the line above and use a
      # host bind mount — data then lives next to compose.yaml in ./data:
      #   - ./data:/data
    restart: unless-stopped

  web:
    # Pull the published image, or build locally if it is not present:
    #   docker compose up -d --build
    image: ghcr.io/stuartmeeks/foreman-web:latest
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: foreman-web
    depends_on:
      - server
    ports:
      # Open http://localhost:8725 to use the foreman.
      - "8725:80"
    restart: unless-stopped

volumes:
  # Back up before a major upgrade if you like:
  #   docker run --rm -v foreman-db:/data -v "$PWD:/backup" busybox \
  #     tar czf /backup/foreman-db.tgz /data
  foreman-db:
