# Run Foreman with Docker Compose.
#
# Everything is grouped in Docker Desktop under the "foreman" PROJECT (the `name:`
# below), so you start/stop it as one unit even as more services are added.
#
#   docker compose up -d                          # start (pulls images first time)
#   docker compose pull && docker compose up -d   # update to newer images
#   docker compose stop                           # turn OFF but KEEP the containers
#   docker compose start                          # turn them back on
#   docker compose down                           # REMOVE containers + network
#
# For everyday on/off use `stop` / `start` — the containers stay listed in Docker
# Desktop (just stopped). Use `down` only when you want to remove them; your data
# survives either way, in the `foreman-db` volume (see the volumes section).
#
# The project groups separate services (mcp-game-data, server, web) under the one
# "foreman" project so you start and stop them as a unit.
name: foreman

services:
  mcp-game-data:
    # Pull the published image, or build locally if it is not present:
    #   docker compose up -d --build
    image: ghcr.io/stuartmeeks/foreman-mcp-game-data:latest
    build:
      context: .
      dockerfile: packages/mcp-game-data/Dockerfile
    container_name: foreman-mcp-game-data
    ports:
      - "8723:8723"
    restart: unless-stopped

    # ── Optional overrides — uncomment as needed ───────────────────────────────
    # environment:
    #   # Use the experimental channel instead of stable:
    #   SATISFACTORY_GAME_CHANNEL: experimental
    #   # Or point at your own install (also uncomment the volume below):
    #   SATISFACTORY_GAME_DIR: /game
    # volumes:
    #   # Windows (Steam) — adjust to your install path:
    #   - "C:/Program Files (x86)/Steam/steamapps/common/Satisfactory:/game:ro"

  server:
    # Pull the published image, or build locally if it is not present:
    #   docker compose up -d --build
    image: ghcr.io/stuartmeeks/foreman-server:latest
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: foreman-server
    depends_on:
      - mcp-game-data
      - mcp-save-game
    ports:
      - "8724:8724"
    environment:
      MCP_URL: http://mcp-game-data:8723/mcp
      # The save-game MCP reads each playthrough's uploaded .sav from the shared
      # saves volume (SAVE_DATA_DIR); the server injects the active playthrough's
      # path into save-game tool calls.
      SAVE_MCP_URL: http://mcp-save-game:8726/mcp
      SAVE_DATA_DIR: /data/saves
      DATABASE_URL: file:/data/foreman.db
      # Accounts. BETTER_AUTH_SECRET signs session cookies. Leave it unset and the
      # server generates one on first start and persists it in the /data volume
      # (sessions survive restarts); set it explicitly only for multi-instance or
      # Postgres deployments. BETTER_AUTH_URL is the public origin the app is served
      # from (needed for correct cookies behind a proxy); AUTH_TRUSTED_ORIGINS is an
      # optional comma-separated allow list for credentialed cross-origin requests.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-}
      # Hosted tier: the server's own Anthropic key. Leave unset to require each
      # client to supply its own key via the x-anthropic-api-key header.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional model override (default claude-sonnet-4-6):
      # ANTHROPIC_MODEL: claude-opus-4-8
      # ── Use a different frontier provider (OpenAI-compatible) ─────────────────
      # Set LLM_PROVIDER=openai with a key + (optionally) a base URL to run on
      # OpenAI, OpenRouter, Gemini's OpenAI-compatible endpoint, etc.
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
    volumes:
      # The SQLite database lives in a named volume, so your sessions and work
      # orders SURVIVE upgrades: `docker compose pull` + `up -d` recreates the
      # container against the new image and re-attaches this volume. Migrations
      # run automatically at start and are additive (never drop data). Plain
      # `docker compose down` keeps it too — only `down -v` (or removing the
      # volume) deletes your data.
      - foreman-db:/data
      # Uploaded playthrough saves live in their own volume, shared read/write
      # with the save-game MCP (mounted at the same path there) so it can read a
      # save by the absolute path the server injects.
      - foreman-saves:/data/saves
      # Prefer a folder you control instead? Comment the lines above and use host
      # bind mounts — data then lives next to compose.yaml in ./data:
      #   - ./data:/data
      #   - ./data/saves:/data/saves
    restart: unless-stopped

  web:
    # Pull the published image, or build locally if it is not present:
    #   docker compose up -d --build
    image: ghcr.io/stuartmeeks/foreman-web:latest
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: foreman-web
    depends_on:
      - server
    ports:
      # Open http://localhost:8725 to use the foreman.
      - "8725:80"
    restart: unless-stopped

  # Live save-game data (pioneer progress from a .sav file) on port 8726.
  # A first-class service of the project, so `docker compose pull`/`up` include it.
  # It runs even with no save configured — it logs a warning and serves empty
  # results rather than failing — so it is safe to leave running. To use it, set
  # SAVE_FILE_PATH to the .sav path INSIDE the container and mount your save
  # directory read-only (uncomment `volumes` below), e.g.:
  #   SAVE_FILE_PATH=/saves/MySave.sav docker compose up -d
  mcp-save-game:
    image: ghcr.io/stuartmeeks/foreman-mcp-save-game:latest
    build:
      context: .
      dockerfile: packages/mcp-save-game/Dockerfile
    container_name: foreman-mcp-save-game
    ports:
      - "8726:8726"
    environment:
      # Optional fixed save (legacy/dev): path to a .sav INSIDE the container
      # (mount the save directory below). When the app uploads per-playthrough
      # saves, those are served from SAVE_DATA_DIR instead.
      SAVE_FILE_PATH: ${SAVE_FILE_PATH:-}
      # Playthrough saves uploaded by the app live here (shared with the server).
      # Host-injected savePath arguments must resolve inside this directory.
      SAVE_DATA_DIR: /data/saves
    volumes:
      # Shared with the server: the app writes uploaded saves here, this MCP reads
      # them by absolute path.
      - foreman-saves:/data/saves
    #   # Also mount a folder holding a fixed .sav read-only (legacy SAVE_FILE_PATH),
    #   # then set SAVE_FILE_PATH to the in-container path:
    #   - "C:/Users/you/AppData/Local/FactoryGame/Saved/SaveGames:/saves:ro"

volumes:
  # Back up before a major upgrade if you like:
  #   docker run --rm -v foreman-db:/data -v "$PWD:/backup" busybox \
  #     tar czf /backup/foreman-db.tgz /data
  foreman-db:
  # Uploaded playthrough saves, shared between the server and the save-game MCP.
  foreman-saves:
